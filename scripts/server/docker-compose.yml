version: '3.8'

services:
  frps:
    image: fatedier/frps:${FRP_VERSION:-0.60.0}
    container_name: frps
    restart: unless-stopped
    network_mode: "service:nginx"
    volumes:
      - ./configs/frps.toml:/etc/frp/frps.toml:ro
      - ./logs:/var/log/frp
    environment:
      - TZ=Asia/Shanghai

  nginx:
    image: nginx:alpine
    container_name: frp-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      {{#DASHBOARD_ENABLED}}
      - "${DASHBOARD_PORT:-7500}:${DASHBOARD_PORT:-7500}"
      {{/DASHBOARD_ENABLED}}
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/www:/var/www/certbot:ro
      - ./certs/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - frps

  certbot:
    image: certbot/certbot:latest
    container_name: frp-certbot
    restart: unless-stopped
    volumes:
      - ./certs/www:/var/www/certbot
      - ./certs/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    environment:
      - TZ=Asia/Shanghai

networks:
  default:
    name: frp-tunnel
