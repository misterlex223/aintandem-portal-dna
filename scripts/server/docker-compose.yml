services:
  frps:
    image: ghcr.io/snowdreamtech/frps:${FRP_VERSION:-0.68.1}
    container_name: frps
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-7500}:7500"
    expose:
      - "8080"
    volumes:
      - ./configs/frps.toml:/etc/frp/frps.toml:ro
      - ./logs:/var/log/frp
    environment:
      - TZ=Asia/Shanghai
    networks:
      - frp-internal

  nginx:
    image: nginx:alpine
    container_name: frp-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/www:/var/www/certbot:ro
      - ./certs/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - frps
    networks:
      - frp-internal

  certbot:
    image: certbot/certbot:latest
    container_name: frp-certbot
    restart: unless-stopped
    volumes:
      - ./certs/www:/var/www/certbot
      - ./certs/letsencrypt:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c", "while true; do sleep 12h; certbot renew; done"]
    environment:
      - TZ=Asia/Shanghai

networks:
  frp-internal:
    driver: bridge
